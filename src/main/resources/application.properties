# Database Configuration
# Fallback to H2 if no environment variables are provided (local dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:gymportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for dev inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable default Spring Security login page (we handle auth ourselves)
spring.security.user.name=admin
spring.security.user.password=admin123

# Serve static files
spring.web.resources.static-locations=classpath:/static/

# Logging
logging.level.com.gymportal=INFO

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
