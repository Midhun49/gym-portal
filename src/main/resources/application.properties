# Application
spring.application.name=gym-portal
server.port=8080
server.address=0.0.0.0

# H2 Embedded Database
spring.datasource.url=jdbc:h2:mem:gymportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for dev inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable default Spring Security login page (we handle auth ourselves)
spring.security.user.name=admin
spring.security.user.password=admin123

# Serve static files
spring.web.resources.static-locations=classpath:/static/

# Logging
logging.level.com.gymportal=INFO

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
